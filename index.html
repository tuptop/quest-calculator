<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Калькулятор стоимости</title>
    <link rel="stylesheet" href="styles.css" />

  <body>
    <main class="calculator" data-node-id="131:6687">
      <div class="tabs" role="tablist" data-node-id="131:6690">
        <button class="tab tab--active" type="button" role="tab" aria-selected="true" data-project-type="event" data-node-id="131:6691">
          <span class="tab__label">Ивент</span>
        </button>
        <button class="tab" type="button" role="tab" aria-selected="false" data-project-type="quest" data-node-id="131:6693">
          <span class="tab__label">Квест</span>
        </button>
      </div>

      <section class="panel panel--main" data-node-id="131:6695">
        <header class="intro" data-node-id="131:6696">
          <h1 class="intro__title" data-node-id="131:6697">Калькулятор стоимости&nbsp;презентации</h1>
          <p class="intro__text" data-node-id="131:6698">
            Введите количество слайдов, отрисовок и&nbsp;сроки от&nbsp;передачи последних материалов в&nbsp;работу до&nbsp;дедлайна
          </p>
        </header>

        <div class="options" data-node-id="131:6699">
          <div class="option-row" data-node-id="131:6700">
            <div class="option-label" data-node-id="131:6701">Слайды</div>
            <div class="option-inputs" data-node-id="131:6703">
              <div class="input-group" data-node-id="131:6704">
                <div class="input-field">
                  <label class="input-inner" for="slidesCount">
                    <input class="input-number" id="slidesCount" type="number" min="0" max="200" step="1" value="20" />
                    <span class="input-unit">шт</span>
                  </label>
                </div>
                <input class="range" id="slidesCountRange" type="range" min="0" max="200" step="1" value="20" aria-label="Количество слайдов" />
              </div>

              <div class="input-group" data-node-id="131:6705">
                <div class="input-field">
                  <label class="input-inner" for="slidesPrice">
                    <input class="input-number" id="slidesPrice" type="number" min="1500" max="2500" step="1" value="2500" />
                    <span class="input-unit">₽ за&nbsp;шт.</span>
                  </label>
                </div>
                <input class="range" id="slidesPriceRange" type="range" min="1500" max="2500" step="1" value="2500" aria-label="Цена за слайд" />
              </div>
            </div>
          </div>

          <div class="option-row" data-node-id="131:6706">
            <div class="option-label" data-node-id="131:6707">Отрисовки</div>
            <div class="option-inputs" data-node-id="131:6709">
              <div class="input-group" data-node-id="131:6710">
                <div class="input-field">
                  <label class="input-inner" for="rendersCount">
                    <input class="input-number" id="rendersCount" type="number" min="0" max="50" step="1" value="0" />
                    <span class="input-unit">шт</span>
                  </label>
                </div>
                <input class="range" id="rendersCountRange" type="range" min="0" max="50" step="1" value="0" aria-label="Количество отрисовок" />
              </div>

              <div class="input-group" data-node-id="131:6711">
                <div class="input-field">
                  <label class="input-inner" for="rendersPrice">
                    <input class="input-number" id="rendersPrice" type="number" min="750" max="1500" step="1" value="1500" />
                    <span class="input-unit">₽ за&nbsp;шт.</span>
                  </label>
                </div>
                <input class="range" id="rendersPriceRange" type="range" min="750" max="1500" step="1" value="1500" aria-label="Цена за отрисовку" />
              </div>
            </div>
          </div>

          <div class="option-row" data-node-id="131:6712">
            <div class="option-label option-label--sans" data-node-id="131:6713">Сроки</div>
            <div class="option-inputs option-inputs--single" data-node-id="131:6715">
              <div class="input-group" data-node-id="131:6716">
                <div class="input-field">
                  <label class="input-inner" for="deadlineDays">
                    <input class="input-number" id="deadlineDays" type="number" min="0" max="30" step="1" value="14" />
                    <span class="input-unit" id="deadlineUnit">дней</span>
                    <span class="input-suffix" id="deadlinePercent">+00,00%</span>
                    <span class="deadline-icon" id="deadlineIcon" aria-hidden="true">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">

                      </svg>
                    </span>
                  </label>
                </div>
                <input class="range" id="deadlineDaysRange" type="range" min="0" max="30" step="1" value="14" aria-label="Срок в днях" />
              </div>
              <div class="deadline-warning" id="deadlineWarning">Это минимально возможный срок</div>
            </div>
          </div>

          <label class="checkbox" data-node-id="165:1072">
            <input id="keyvisual" type="checkbox" />
            <span class="checkbox-box" aria-hidden="true">
              <svg class="checkbox-icon" viewBox="0 0 18 16" aria-hidden="true">

            </span>
            <span class="checkbox-text">Кейвижуал <span class="checkbox-price" id="keyvisualPrice">+30 000 ₽</span></span>
          </label>
        </div>
      </section>
